<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>My Corner — 2026</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header>
		<h1>My Corner</h1>
		<p>A tiny corner of the internet for posts, games, movies, moods, and animals.</p>
	</header>

	<main class="layout">
		<div class="content">
			<section class="box" id="posts">
				<h2>Posts</h2>
				<form id="postForm">
					<input type="text" id="postTitle" placeholder="Title" required>
					<textarea id="postContent" placeholder="Write something..." required></textarea>
					<input type="file" id="postImage" accept="image/*">
					<button type="submit">Add Post</button>
				</form>
				<div id="postsList"></div>
			</section>
		</div>

		<aside id="sidebar">
			<button id="toggleSidebar" class="btn small">Toggle</button>

			<section class="box" id="media">
				<h2>Games & Movies (2026)</h2>
				<div class="row">
					<div>
						<h3>Games</h3>
						<form id="gameForm">
							<input type="text" id="gameName" placeholder="Game name" required>
							<input type="number" id="gameYear" placeholder="Year" value="2026" min="1900">
							<div id="gameRating" class="stars" data-rating="0"></div>
							<button type="submit">Add Game</button>
						</form>
						<div id="gamesList"></div>
					</div>

					<div>
						<h3>Movies</h3>
						<form id="movieForm">
							<input type="text" id="movieName" placeholder="Movie title" required>
							<input type="number" id="movieYear" placeholder="Year" value="2026" min="1900">
							<div id="movieRating" class="stars" data-rating="0"></div>
							<button type="submit">Add Movie</button>
						</form>
						<div id="moviesList"></div>
					</div>
				</div>
			</section>

			<section class="box" id="moods">
				<h2>How I'm Feeling Today</h2>
				<form id="moodForm">
					<input type="date" id="moodDate" required>
					<select id="moodSelect">
						<option value="happy">Happy</option>
						<option value="sad">Sad</option>
						<option value="frustrated">Frustrated</option>
						<option value="excited">Excited</option>
						<option value="anxious">Anxious</option>
						<option value="tired">Tired</option>
						<option value="content">Content</option>
					</select>
					<button type="submit">Save Mood</button>
				</form>
				<div id="todayMood"></div>
				<h3>Mood History</h3>
				<div id="moodHistory"></div>
			</section>

			<section class="box" id="animals">
				<h2>Favorite Animals</h2>
				<form id="animalForm">
					<input type="text" id="animalName" placeholder="Animal name" required>
					<button type="submit">Add Animal</button>
				</form>
				<div id="animalsList"></div>
			</section>

			<section class="box" id="favorites">
				<h2>Top 5 Favorite Games, Animated Movies & TV Shows</h2>
				<div class="row">
					<div>
						<h3>Top 5 Games</h3>
						<form id="favGameForm">
							<input type="text" id="favGameName" placeholder="Game name" required>
							<button type="submit">Add to Top 5</button>
						</form>
						<div id="favGamesList"></div>
					</div>

					<div>
						<h3>Top 5 Animated Movies</h3>
						<form id="favMovieForm">
							<input type="text" id="favMovieName" placeholder="Animated movie title" required>
							<button type="submit">Add to Top 5</button>
						</form>
						<div id="favMoviesList"></div>
					</div>

					<div>
						<h3>Top 5 TV Shows</h3>
						<form id="favShowForm">
							<input type="text" id="favShowName" placeholder="TV show name" required>
							<button type="submit">Add to Top 5</button>
						</form>
						<div id="favShowsList"></div>
					</div>
				</div>
			</section>
		</aside>
	</main>

	<script src="script.js"></script>
</body>
</html>
